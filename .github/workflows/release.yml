name: Release

# Signed release pipeline for the Tauri auto-updater.
#
# Trigger: push a tag matching `v*` (e.g. `v0.3.0`). Runs a build on each
# platform matrix target, signs each installer with the Tauri updater
# key (stored in Actions Secrets), and attaches every artifact + the
# `latest.json` manifest to a GitHub Release. The updater endpoint
# configured in `tauri.conf.json` points at
# `/releases/latest/download/latest.json`, so the Release flips the app
# to the new version the moment the release is published.
#
# Required repository secrets:
#   TAURI_SIGNING_PRIVATE_KEY          — base64-encoded minisign private key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — passphrase for the key above
#
# Generate with: `npm run tauri signer generate -- -w ~/.tauri/repo-dashboard.key`.
# Store the public key verbatim in `src-tauri/tauri.conf.json` → plugins.updater.pubkey.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          - platform: ubuntu-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            build-essential \
            libssl-dev \
            libxdo-dev \
            pkg-config

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      - name: Build + sign + attach to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Repo Dashboard ${{ github.ref_name }}"
          releaseBody: |
            See the commit log for changes. The auto-updater will pick this release up automatically for existing installs.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
